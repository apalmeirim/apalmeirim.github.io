<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>music</title>
    <link rel="stylesheet" href="../style.css" />
  </head>
  <body>
    <main class="unbox-layout">
      <section class="unbox-card" aria-live="polite">
        <div class="unbox-embed" id="track-embed"></div>
        <p class="unbox-track" id="track-name">loading...</p>
        <p class="unbox-artist" id="track-artist"></p>
        <button class="link unbox-date-link" id="today-date-trigger" type="button" aria-haspopup="dialog" aria-expanded="false">
          <span class="unbox-date" id="today-date"></span>
        </button>
        <div class="calendar-overlay" id="calendar-overlay" hidden>
          <div class="calendar-popup" role="dialog" aria-modal="true" aria-label="daily song calendar">
            <div class="calendar-header">
              <button class="calendar-nav" id="calendar-prev" type="button" aria-label="previous month">&lt;</button>
              <p class="calendar-month" id="calendar-month"></p>
              <button class="calendar-nav" id="calendar-next" type="button" aria-label="next month">&gt;</button>
            </div>
            <div class="calendar-weekdays" aria-hidden="true">
              <span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span><span>Sun</span>
            </div>
            <div class="calendar-grid" id="calendar-grid"></div>
            <a class="link unbox-playlist" href="https://open.spotify.com/playlist/35iWgU5Ah270CPSMCcP4h4" target="_blank" rel="noreferrer">
              visit playlist
            </a>
          </div>
        </div>
      </section>

      <a class="back-link back-link-bottom" href="../main/">back</a>
    </main>

    <script src="../script.js"></script>
    <script>
      const dateEl = document.getElementById("today-date");
      const nameEl = document.getElementById("track-name");
      const artistEl = document.getElementById("track-artist");
      const embedEl = document.getElementById("track-embed");
      const dateTriggerEl = document.getElementById("today-date-trigger");
      const calendarOverlayEl = document.getElementById("calendar-overlay");
      const calendarGridEl = document.getElementById("calendar-grid");
      const calendarMonthEl = document.getElementById("calendar-month");
      const calendarPrevEl = document.getElementById("calendar-prev");
      const calendarNextEl = document.getElementById("calendar-next");

      const API_BASE = "https://dsapi-three.vercel.app/api/daily_song";
      const API_ARCHIVE = "https://dsapi-three.vercel.app/api/archive";
      const availableSongMap = new Map();
      let currentMonth = new Date();

      const formatDate = (date) =>
        new Intl.DateTimeFormat("en-GB", {
          year: "numeric",
          month: "long",
          day: "numeric",
        }).format(date);

      const toDateKey = (date) => {
        const year = date.getUTCFullYear();
        const month = String(date.getUTCMonth() + 1).padStart(2, "0");
        const day = String(date.getUTCDate()).padStart(2, "0");
        return `${year}-${month}-${day}`;
      };

      const getTrackId = (spotifyUrl) => {
        if (!spotifyUrl) return "";
        const match = spotifyUrl.match(/track\/([A-Za-z0-9]+)/);
        return match ? match[1] : "";
      };

      const renderEmbed = (trackId) => {
        if (!trackId) return;
        embedEl.innerHTML =
          `<iframe title="spotify track" ` +
          `src="https://open.spotify.com/embed/track/${trackId}" ` +
          `width="100%" height="152" frameborder="0" ` +
          `allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" ` +
          `loading="lazy"></iframe>`;
      };

      const applySong = (data) => {
        nameEl.textContent = data.title || "unknown track";
        artistEl.textContent = data.artist || "";
        if (data.addedAt) {
          dateEl.textContent = formatDate(new Date(data.addedAt));
        } else {
          dateEl.textContent = "";
        }
        renderEmbed(getTrackId(data.spotifyUrl));
      };

      const loadArchive = async () => {
        try {
          const res = await fetch(API_ARCHIVE);
          if (!res.ok) throw new Error("failed");
          const songs = await res.json();
          if (!Array.isArray(songs)) return;

          songs.forEach((song) => {
            if (!song?.addedAt) return;
            const key = toDateKey(new Date(song.addedAt));
            if (!availableSongMap.has(key)) {
              availableSongMap.set(key, song);
            }
          });
        } catch (error) {
          return;
        }
      };

      const getDaysInMonth = (year, monthIndex) => new Date(year, monthIndex + 1, 0).getDate();

      const renderCalendar = () => {
        const year = currentMonth.getFullYear();
        const monthIndex = currentMonth.getMonth();
        const monthStart = new Date(year, monthIndex, 1);
        const daysInMonth = getDaysInMonth(year, monthIndex);
        const firstWeekday = (monthStart.getDay() + 6) % 7;
        const monthLabel = new Intl.DateTimeFormat("en-GB", { month: "long", year: "numeric" }).format(monthStart);

        calendarMonthEl.textContent = monthLabel;
        calendarGridEl.innerHTML = "";

        const dateKeys = Array.from({ length: daysInMonth }, (_, index) => {
          const day = String(index + 1).padStart(2, "0");
          const month = String(monthIndex + 1).padStart(2, "0");
          return `${year}-${month}-${day}`;
        });

        for (let index = 0; index < firstWeekday; index += 1) {
          const spacer = document.createElement("span");
          spacer.className = "calendar-empty";
          calendarGridEl.appendChild(spacer);
        }

        dateKeys.forEach((dateKey, index) => {
          const button = document.createElement("button");
          button.type = "button";
          button.textContent = String(index + 1);
          button.className = "calendar-day";

          const song = availableSongMap.get(dateKey);
          if (song) {
            button.classList.add("available");
            button.addEventListener("click", async () => {
              applySong(song);
              closeCalendar();
            });
          } else {
            button.disabled = true;
          }

          calendarGridEl.appendChild(button);
        });
      };

      const openCalendar = () => {
        calendarOverlayEl.hidden = false;
        dateTriggerEl.setAttribute("aria-expanded", "true");
        renderCalendar();
      };

      const closeCalendar = () => {
        calendarOverlayEl.hidden = true;
        dateTriggerEl.setAttribute("aria-expanded", "false");
      };

      const loadSong = async () => {
        try {
          const res = await fetch(API_BASE);
          if (!res.ok) throw new Error("failed");
          const data = await res.json();
          applySong(data);
          if (data?.addedAt) {
            const songDate = new Date(data.addedAt);
            const songDateKey = toDateKey(songDate);
            availableSongMap.set(songDateKey, data);
            currentMonth = new Date(songDate.getFullYear(), songDate.getMonth(), 1);
          }
        } catch (error) {
          nameEl.textContent = "unable to load today's track";
          artistEl.textContent = "";
          dateEl.textContent = "";
        }
      };

      dateTriggerEl.addEventListener("click", async () => {
        if (!calendarOverlayEl.hidden) {
          closeCalendar();
          return;
        }
        openCalendar();
      });

      calendarOverlayEl.addEventListener("click", (event) => {
        if (event.target === calendarOverlayEl) {
          closeCalendar();
        }
      });

      calendarPrevEl.addEventListener("click", async () => {
        currentMonth = new Date(currentMonth.getFullYear(), currentMonth.getMonth() - 1, 1);
        renderCalendar();
      });

      calendarNextEl.addEventListener("click", async () => {
        currentMonth = new Date(currentMonth.getFullYear(), currentMonth.getMonth() + 1, 1);
        renderCalendar();
      });

      const init = async () => {
        await loadArchive();
        await loadSong();
      };

      init();
    </script>
  </body>
</html>
