<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>click</title>
    <link rel="stylesheet" href="../style.css" />
  </head>
  <body>
    <main class="click-layout">
      <section class="click-game">
        <p class="click-score" aria-live="polite"><span id="click-count">0</span></p>
        <button class="cookie-button" id="click-button" type="button" aria-label="click cookie to add one point">
          <img class="cookie-image" src="./mc.png" alt="" aria-hidden="true" />
          <span class="cookie-crumbs" id="cookie-crumbs" aria-hidden="true"></span>
        </button>
      </section>
      <a class="back-link back-link-bottom" href="../main/">back</a>
    </main>
    <script src="../script.js"></script>
    <script src="../click.js"></script>
  </body>
</html>
