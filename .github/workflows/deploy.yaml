name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SECRET_CONTENT_REPO: ${{ secrets.SECRET_CONTENT_REPO }}
      SECRET_CONTENT_TOKEN: ${{ secrets.SECRET_CONTENT_TOKEN }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout private secret content
        if: ${{ env.SECRET_CONTENT_REPO != '' && env.SECRET_CONTENT_TOKEN != '' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SECRET_CONTENT_REPO }}
          token: ${{ env.SECRET_CONTENT_TOKEN }}
          path: .secret-src
          lfs: true

      - name: Inject secret pages into deploy artifact
        if: ${{ env.SECRET_CONTENT_REPO != '' && env.SECRET_CONTENT_TOKEN != '' }}
        run: |
          set -euo pipefail
          if [ -d ".secret-src/secret" ]; then
            rm -rf secret
            cp -R .secret-src/secret ./secret
          fi
          if [ -d ".secret-src/images/secret" ]; then
            mkdir -p images
            rm -rf images/secret
            cp -R .secret-src/images/secret ./images/secret
          fi
          test -f secret/index.html
          test -d images/secret
          ls -la secret
          ls -la images/secret

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
